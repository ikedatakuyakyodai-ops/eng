<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Gemini English (DEBUG)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <style>
    body { overscroll-behavior-y: none; background-color: #f8fafc; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- API KEYS ---
    const g1 = "AIzaSyB-pkRaBP";
    const g2 = "JC9rftmlKCqsKSN";
    const g3 = "pFsyZC7bds";
    const GEMINI_API_KEY = g1 + g2 + g3;

    const f1 = "AIzaSyAUL6xawq0";
    const f2 = "B6DDi0M1o31q9qQ";
    const f3 = "riU6p7-wU";
    const FIREBASE_API_KEY = f1 + f2 + f3;

    const firebaseConfig = {
      apiKey: FIREBASE_API_KEY,
      authDomain: "my-english-app-514d2.firebaseapp.com",
      projectId: "my-english-app-514d2",
      storageBucket: "my-english-app-514d2.firebasestorage.app",
      messagingSenderId: "49093844143",
      appId: "1:49093844143:web:129113db0452d138b6085a"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function App() {
      const [cloudStatus, setCloudStatus] = useState('connecting');
      const [user, setUser] = useState(null);
      const [messages, setMessages] = useState([{ id: 1, role: 'model', text: "デバッグモード起動完了。何か話しかけて、通信エラーを発生させてください。" }]);
      const [input, setInput] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      
      // デバッグログ用State
      const [debugLogs, setDebugLogs] = useState([]);

      const addLog = (tag, msg, isError = false) => {
        const time = new Date().toLocaleTimeString();
        setDebugLogs(prev => [`[${time}] ${tag}: ${msg}`, ...prev].slice(0, 15));
      };

      useEffect(() => {
        auth.signInAnonymously()
          .then((res) => {
            setUser(res.user);
            setCloudStatus('online');
            addLog("Firebase", "Auth Success");
          })
          .catch((e) => {
            setCloudStatus('offline');
            addLog("Firebase Error", e.message, true);
          });
      }, []);

      const checkGrammar = async (text, msgId) => {
        try {
          addLog("Grammar", "APIリクエスト送信中...");
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: `"${text}"` }] }],
              systemInstruction: { parts: [{ text: "添削してください" }] }
            })
          });

          if (!res.ok) {
            const errText = await res.text();
            addLog("Grammar API NG", `Status: ${res.status} ${res.statusText}`, true);
            addLog("Grammar API Body", errText, true);
            return;
          }
          addLog("Grammar", "APIレスポンス成功");
          setMessages(prev => prev.map(m => m.id === msgId ? { ...m, isChecked: true } : m));
        } catch (e) {
          addLog("Grammar Catch", e.message, true);
        }
      };

      const sendMessage = async () => {
        if (!input.trim() || isLoading) return;
        
        const uMsg = { id: Date.now(), role: 'user', text: input, isChecked: false };
        setMessages(p => [...p, uMsg]);
        setInput('');
        setIsLoading(true);

        checkGrammar(uMsg.text, uMsg.id);

        try {
          addLog("Chat", "APIリクエスト送信中...");
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ role: 'user', parts: [{ text: uMsg.text }] }]
            })
          });

          if (!res.ok) {
            const errText = await res.text();
            addLog("Chat API NG", `Status: ${res.status} ${res.statusText}`, true);
            addLog("Chat API Body", errText, true);
            throw new Error(`Status: ${res.status}`);
          }
          
          addLog("Chat", "APIレスポンス成功");
          const data = await res.json();
          const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || '返答なし';
          setMessages(p => [...p, { id: Date.now(), role: 'model', text: aiText }]);
          
        } catch (e) {
          addLog("Chat Catch", e.message, true);
        } finally {
          setIsLoading(false);
        }
      };

      return (
        <div className="flex flex-col h-[100dvh]">
          {/* デバッグログコンソール (最前面) */}
          {debugLogs.length > 0 && (
            <div className="absolute top-0 left-0 right-0 max-h-[40vh] overflow-y-auto bg-black/90 p-3 z-50 text-[10px] sm:text-xs font-mono shadow-2xl">
              <div className="text-white font-bold mb-2 border-b border-gray-600 pb-1 flex justify-between">
                <span>=== SYSTEM DEBUG LOG ===</span>
                <button onClick={() => setDebugLogs([])} className="bg-red-600 text-white px-2 rounded">Clear</button>
              </div>
              {debugLogs.map((log, i) => (
                <div key={i} className={`mb-1.5 leading-tight ${log.includes('NG') || log.includes('Error') || log.includes('Catch') || log.includes('Body') ? 'text-red-400 break-words' : 'text-green-400'}`}>
                  {log}
                </div>
              ))}
            </div>
          )}

          <header className="bg-white border-b p-4 flex justify-between items-center z-10">
            <h1 className="font-bold text-blue-600">Gemini English</h1>
            <div className={`text-xs font-bold ${cloudStatus === 'online' ? 'text-emerald-500' : 'text-slate-400'}`}>
              {cloudStatus === 'online' ? 'クラウド同期中' : '一時保存モード'}
            </div>
          </header>

          <main className="flex-1 overflow-y-auto p-4 space-y-4 pt-[45vh]">
            {messages.map(m => (
              <div key={m.id} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-[85%] p-3 rounded-xl ${m.role === 'user' ? 'bg-blue-600 text-white' : 'bg-white border'}`}>
                  {m.text}
                  {m.role === 'user' && !m.isChecked && <div className="text-[10px] text-blue-200 mt-1">添削中...</div>}
                </div>
              </div>
            ))}
            {isLoading && <div className="text-slate-500 text-sm">AI入力待ち...</div>}
          </main>

          <footer className="p-4 bg-white border-t flex gap-2 shrink-0 z-10">
            <input 
              value={input} 
              onChange={e => setInput(e.target.value)}
              className="flex-1 bg-slate-100 rounded-xl px-4 py-2 outline-none"
              placeholder="Test..."
              onKeyDown={e => e.key === 'Enter' && sendMessage()}
            />
            <button onClick={sendMessage} className="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold">
              Send
            </button>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
