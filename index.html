<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Gemini English (DEBUG)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <style>body { overscroll-behavior-y: none; background-color: #f8fafc; }</style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const GEMINI_API_KEY = "AIzaSyB-pkRaBP" + "JC9rftmlKCqsKSN" + "pFsyZC7bds";
    const FIREBASE_API_KEY = "AIzaSyAUL6xawq0" + "B6DDi0M1o31q9qQ" + "riU6p7-wU";

    const firebaseConfig = {
      apiKey: FIREBASE_API_KEY,
      authDomain: "my-english-app-514d2.firebaseapp.com",
      projectId: "my-english-app-514d2",
      storageBucket: "my-english-app-514d2.firebasestorage.app",
      messagingSenderId: "49093844143",
      appId: "1:49093844143:web:129113db0452d138b6085a"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function App() {
      const [messages, setMessages] = useState([{ id: 1, role: 'model', text: "デバッグモード起動。英語を入力してエラーを発生させてください。" }]);
      const [input, setInput] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const [debugLogs, setDebugLogs] = useState([]);

      const addLog = (tag, msg) => {
        const time = new Date().toLocaleTimeString();
        setDebugLogs(prev => [`[${time}] ${tag}: ${msg}`, ...prev].slice(0, 15));
      };

      useEffect(() => {
        auth.signInAnonymously().then(() => addLog("Firebase", "Auth Success")).catch(e => addLog("Firebase Error", e.message));
      }, []);

      const fetchWithDebug = async (url, options, tag) => {
        try {
          addLog(tag, "APIリクエスト送信中...");
          const response = await fetch(url, options);
          if (!response.ok) {
            const errText = await response.text();
            addLog(`${tag} Error Body`, errText);
            throw new Error(`Status ${response.status}: ${errText.substring(0, 100)}...`);
          }
          addLog(tag, "APIレスポンス成功");
          return await response.json();
        } catch (error) {
          addLog(`${tag} Catch`, error.message);
          throw error;
        }
      };

      const sendMessage = async () => {
        if (!input.trim() || isLoading) return;
        const uMsg = { id: Date.now(), role: 'user', text: input };
        setMessages(p => [...p, uMsg]);
        setInput('');
        setIsLoading(true);

        try {
          const res = await fetchWithDebug(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: uMsg.text }] }] })
          }, "ChatAPI");

          const aiText = res.candidates?.[0]?.content?.parts?.[0]?.text;
          if (aiText) setMessages(p => [...p, { id: Date.now(), role: 'model', text: aiText }]);
        } catch (e) {
          // エラーはログに出るのでUI上は何もしない
        } finally {
          setIsLoading(false);
        }
      };

      return (
        <div className="flex flex-col h-[100dvh]">
          {/* デバッグコンソール */}
          <div className="absolute top-0 left-0 right-0 max-h-[40vh] overflow-y-auto bg-black/95 p-3 z-50 text-[10px] sm:text-xs font-mono shadow-2xl">
            <div className="text-white font-bold mb-2 border-b border-gray-600 pb-1 flex justify-between">
              <span>=== SYSTEM DEBUG LOG ===</span>
              <button onClick={() => setDebugLogs([])} className="bg-red-600 text-white px-2 rounded">Clear</button>
            </div>
            {debugLogs.length === 0 && <div className="text-gray-400">待機中...</div>}
            {debugLogs.map((log, i) => (
              <div key={i} className={`mb-1.5 leading-tight ${log.includes('Error') || log.includes('Catch') || log.includes('Body') ? 'text-red-400 break-words font-bold' : 'text-green-400'}`}>
                {log}
              </div>
            ))}
          </div>

          <main className="flex-1 overflow-y-auto p-4 space-y-4 pt-[45vh]">
            {messages.map(m => (
              <div key={m.id} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-[85%] p-4 rounded-xl ${m.role === 'user' ? 'bg-blue-600 text-white' : 'bg-white border'}`}>
                  {m.text}
                </div>
              </div>
            ))}
            {isLoading && <div className="text-slate-500 text-sm">AI通信中...</div>}
          </main>

          <footer className="p-4 bg-white border-t flex gap-2 shrink-0 z-10">
            <input 
              value={input} 
              onChange={e => setInput(e.target.value)}
              className="flex-1 bg-slate-100 rounded-xl px-4 py-3 outline-none"
              placeholder="英語を入力..."
              onKeyDown={e => e.key === 'Enter' && sendMessage()}
            />
            <button onClick={sendMessage} className="bg-blue-600 text-white px-5 py-3 rounded-xl font-bold">
              送信
            </button>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
